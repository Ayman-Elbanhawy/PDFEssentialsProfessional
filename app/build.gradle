tasks.register('generateSbom') {
    notCompatibleWithConfigurationCache('Uses declared dependency inventory reporting')
    group = 'reporting'
    description = 'Generates a lightweight CycloneDX-style dependency inventory for the declared implementation dependencies.'
    outputs.file(layout.buildDirectory.file('reports/release/sbom.json'))
    doLast {
        def components = project.configurations.getByName('implementation').allDependencies.collect { dependency ->
            [
                group   : dependency.group ?: 'project',
                name    : dependency.name,
                version : dependency.version ?: 'unspecified',
            ]
        }.sort { a, b -> "${a.group}:${a.name}:${a.version}" <=> "${b.group}:${b.name}:${b.version}" }
        def payload = [
            bomFormat   : 'CycloneDX',
            specVersion : '1.5',
            version     : 1,
            metadata    : [
                component: [
                    type   : 'application',
                    name   : 'com.aymanelbanhawy.enterprisepdf.app',
                    version: '1.0.0',
                ],
            ],
            components  : components.collect { dependency ->
                [
                    type   : 'library',
                    name   : dependency.name,
                    group  : dependency.group,
                    version: dependency.version,
                    purl   : "pkg:maven/${dependency.group}/${dependency.name}@${dependency.version}",
                ]
            },
        ]
        def output = layout.buildDirectory.file('reports/release/sbom.json').get().asFile
        output.parentFile.mkdirs()
        output.text = JsonOutput.prettyPrint(JsonOutput.toJson(payload))
    }
}

tasks.register('generateLicenseReport') {
    notCompatibleWithConfigurationCache('Uses declared dependency inventory reporting')
    group = 'reporting'
    description = 'Generates a dependency inventory with resolved production licenses.'
    outputs.file(layout.buildDirectory.file('reports/release/licenses.csv'))
    doLast {
        def knownLicenses = [
            'project:editor-core': 'Internal-Proprietary',
            'PDFEssentialsProfessional:editor-core': 'Internal-Proprietary',
            'project:ai-assistant': 'Internal-Proprietary',
            'PDFEssentialsProfessional:ai-assistant': 'Internal-Proprietary',
            'project:viewer-engine': 'Apache-2.0',
            'PDFEssentialsProfessional:viewer-engine': 'Apache-2.0',
            'androidx.core:core-ktx': 'Apache-2.0',
            'androidx.activity:activity-compose': 'Apache-2.0',
            'androidx.lifecycle:lifecycle-runtime-compose': 'Apache-2.0',
            'androidx.lifecycle:lifecycle-viewmodel-compose': 'Apache-2.0',
            'androidx.lifecycle:lifecycle-viewmodel-ktx': 'Apache-2.0',
            'androidx.compose.ui:ui': 'Apache-2.0',
            'androidx.compose.ui:ui-tooling-preview': 'Apache-2.0',
            'androidx.compose.material3:material3': 'Apache-2.0',
            'com.google.android.material:material': 'Apache-2.0',
            'androidx.compose.material:material-icons-extended': 'Apache-2.0',
            'androidx.work:work-runtime-ktx': 'Apache-2.0',
            'androidx.biometric:biometric': 'Apache-2.0',
            'org.jetbrains.kotlinx:kotlinx-coroutines-android': 'Apache-2.0',
            'org.jetbrains.kotlinx:kotlinx-serialization-json': 'Apache-2.0',
            'org.jetbrains.kotlin:kotlin-stdlib': 'Apache-2.0'
        ]
        def dependencies = configurations.getByName('implementation').allDependencies.collect { dependency ->
            [
                group: dependency.group ?: 'project',
                name: dependency.name,
                version: dependency.version ?: 'unspecified',
                coordinate: dependency.group ? "${dependency.group}:${dependency.name}" : "project:${dependency.name}",
            ]
        }.sort { a, b -> "${a.coordinate}:${a.version}" <=> "${b.coordinate}:${b.version}" }
        def unresolved = []
        def output = layout.buildDirectory.file('reports/release/licenses.csv').get().asFile
        output.parentFile.mkdirs()
        output.text = 'group,name,version,license,status\n'
        dependencies.each { dependency ->
            def license = knownLicenses[dependency.coordinate]
            if (license == null) {
                unresolved << dependency.coordinate
                license = 'UNRESOLVED'
            }
            output << "${dependency.group},${dependency.name},${dependency.version},${license},${license == 'UNRESOLVED' ? 'unresolved' : 'resolved'}\n"
        }
        if (!unresolved.isEmpty()) {
            throw new GradleException("Unresolved production licenses: ${unresolved.unique().sort().join(', ')}")
        }
    }
}

