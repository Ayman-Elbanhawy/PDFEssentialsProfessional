plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
    id 'org.jetbrains.kotlin.plugin.serialization'
    id 'com.google.devtools.ksp'
}

android {
    namespace 'com.aymanelbanhawy.editor.core'
    compileSdk 36

    defaultConfig {
        minSdk 24
        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        consumerProguardFiles 'consumer-rules.pro'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    testOptions {
        unitTests.includeAndroidResources = true
    }

    lint {
        abortOnError true
    }
}

tasks.register('workflowEvidenceBundle') {
    group = 'verification'
    description = 'Verifies that workflow evidence artifacts were generated by the editor-core workflow evidence tests.'
    dependsOn 'testDebugUnitTest'
    outputs.dir(layout.buildDirectory.dir('reports/workflow-evidence'))
    def nestedOutputDir = new File(projectDir, 'editor-core/build/reports/workflow-evidence')
    doLast {
        def outputDir = layout.buildDirectory.dir('reports/workflow-evidence').get().asFile
        def manifestFile = new File(outputDir, 'workflow-manifest.json')
        if (!manifestFile.exists()) {
            def nestedManifestFile = new File(nestedOutputDir, 'workflow-manifest.json')
            if (nestedManifestFile.exists()) {
                copy {
                    from nestedOutputDir
                    into outputDir
                }
            }
        }
        if (!manifestFile.exists()) {
            throw new GradleException("Workflow evidence manifest is missing at ${manifestFile.absolutePath}")
        }
    }
}

dependencies {
    api 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.9.0'
    implementation 'androidx.core:core-ktx:1.15.0'
    implementation 'androidx.exifinterface:exifinterface:1.3.7'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.8.7'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.7'
    implementation 'androidx.room:room-runtime:2.6.1'
    implementation 'androidx.room:room-ktx:2.6.1'
    implementation 'androidx.work:work-runtime-ktx:2.10.0'
    implementation 'androidx.sqlite:sqlite-ktx:2.5.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.7.3'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-play-services:1.9.0'
    implementation 'com.google.mlkit:text-recognition:16.0.1'
    implementation 'com.tom-roush:pdfbox-android:2.0.27.0'
    implementation 'org.bouncycastle:bcprov-jdk15to18:1.72'
    implementation('org.bouncycastle:bcpkix-jdk15to18:1.72') { exclude group: 'org.bouncycastle', module: 'bcprov-jdk18on' }
    ksp 'androidx.room:room-compiler:2.6.1'

    testImplementation 'junit:junit:4.13.2'
    testImplementation 'androidx.test:core:1.6.1'
    testImplementation 'org.jetbrains.kotlinx:kotlinx-coroutines-test:1.9.0'
    testImplementation 'com.google.truth:truth:1.4.4'
    testImplementation 'org.robolectric:robolectric:4.14.1'
    testImplementation 'androidx.work:work-testing:2.10.0'
}



