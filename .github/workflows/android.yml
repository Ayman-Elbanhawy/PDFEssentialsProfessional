name: Enterprise Android CI

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Production source grep gate
        run: |
          grep -RIn "Fake[A-Za-z0-9_]*\|NoOp[A-Za-z0-9_]*\|InMemory[A-Za-z0-9_]*\|Placeholder[A-Za-z0-9_]*\|TODO\|example.invalid" ai-assistant/src/main app/src/main editor-core/src/main viewer-engine/src/main && exit 1 || true
          grep -RIn "FeatureFlag\.Ai\|aiEnabled\|LicensePlan\.Premium\|LicensePlan\.Enterprise" ai-assistant/src/main editor-core/src/main app/src/main
          grep -RIn "SpeechRecognizer\|TextToSpeech\|MediaRecorder\|voice\|playback\|audio" ai-assistant/src/main app/src/main editor-core/src/main
          grep -RIn "policy\|retention\|interrupt\|permission" ai-assistant/src/main app/src/main editor-core/src/main
          grep -RIn "pageedits\\.json\|sidecar" ai-assistant/src/main app/src/main editor-core/src/main viewer-engine/src/main && exit 1 || true
          grep -RIn "contentDescription\|semantics\|TalkBack\|theme\|colorScheme\|icon\|contrast\|reading mode" app/src/main app/src/androidTest app/src/test || true
          grep -RIn "snapshot\|screenshot\|accessibility\|visual" .github/workflows app scripts docs || true
          grep -RIn "zPDF\|pdf-editor-android-app\|MIT" docs app/src/main .github || true
          grep -RIn "ACTION_VIEW\|ACTION_SEND\|onNewIntent\|intent.data" app/src/main
          grep -RIn "OpenDocument\|GetContent\|OpenDocumentTree\|Storage Access Framework\|profileLauncher\|File/Open\|Open PDF\|Open from Files" app/src/main
          grep -RIn "Google Drive\|Downloads\|Documents" app/src/main docs || true
          git grep -nE "com\\.google\\.android\\.apps\\.docs|com\\.microsoft\\.skydrive|com\\.box\\.android" -- app/src/main/java && exit 1 || true
          grep -RIn "validateReleaseReadiness\|smoke\|benchmark\|migration" .github/workflows app build.gradle* scripts docs || true
          git grep -nE "LicensePlan\.Premium|LicensePlan\.Enterprise" -- ai-assistant/src/main/java/com/aymanelbanhawy/aiassistant/core app/src/main/java/com/aymanelbanhawy/enterprisepdf/app/editor app/src/main/java/com/aymanelbanhawy/enterprisepdf/app/audio && exit 1 || true
          git grep -nE "legacyCompatibilityMigrated|LEGACY_COMPATIBILITY_SUFFIX|pageedits\\.json|sidecar|\\.annotations\\.json" -- editor-core/src/main/java/com/aymanelbanhawy/editor/core/write editor-core/src/main/java/com/aymanelbanhawy/editor/core/repository app/src/main viewer-engine/src/main && exit 1 || true
          git grep -nE "legacyCompatibilityMigrated|LEGACY_COMPATIBILITY_SUFFIX|pageedits\\.json|sidecar|\\.annotations\\.json" -- editor-core/src/main/java/com/aymanelbanhawy/editor/core/migration editor-core/src/main/java/com/aymanelbanhawy/editor/core/compat || true
      - name: Release readiness precheck
        run: ./gradlew clean :app:validateReleaseReadiness :app:writeEngineIsolationAudit :app:audioEvidenceBundle :editor-core:workflowEvidenceBundle
      - name: Additional lint coverage
        run: ./gradlew :app:lintDevDebug :ai-assistant:lint :editor-core:lint
      - name: Targeted compare export and protection tests
        run: ./gradlew :editor-core:test --tests "*DefaultWorkflowRepositoryTest" --tests "*SavedDocumentSecurityProcessorTest" --tests "*PdfWriteEnginePersistenceTest"
      - name: Targeted signature, request lifecycle, and template tests
        run: ./gradlew :editor-core:test --tests "*SavedDocumentSecurityProcessorTest" --tests "*DefaultWorkflowRepositoryTest" --tests "*DefaultEditorSessionTest" --tests "*FormSerializationTest"
      - name: Targeted connector conflict and policy tests
        run: ./gradlew :editor-core:test --tests "*DefaultConnectorRepositoryTest"
      - name: Targeted migration and upgrade safety tests
        run: ./gradlew :editor-core:test --tests "*DefaultCoreMigrationRepositoryTest" --tests "*PdfWriteEnginePersistenceTest" --tests "*AiProviderNormalizationTest"
      - name: Targeted AI audio and voice comment tests
        run: ./gradlew :ai-assistant:test --tests "*ProviderSelectionEngineTest" --tests "*ProviderRuntimeErrorHandlingTest" --tests "*MultiDocumentGroundingTest" --tests "*AssistantAudioStateTransitionsTest" --tests "*AssistantAvailabilityResolutionTest" :editor-core:test --tests "*DefaultCollaborationRepositorySyncTest" --tests "*AiFeatureAccessResolverTest" :app:testProdDebugUnitTest --tests "*AudioFeatureEvidenceBundleTest"
      - name: Screenshot and accessibility evidence build
        run: ./gradlew :app:assembleProdDebugAndroidTest
      - name: Source inspiration evidence build
        run: ./gradlew :app:sourceInspirationBundle
      - name: Generate SBOM and license inventory
        run: ./gradlew :app:generateSbom :app:generateLicenseReport
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: release-reports
          path: |
            app/build/reports/release/**
            app/build/reports/release/audio-evidence/**
            app/build/reports/release/quick-tools-proof/**
            app/build/reports/release/source-inspiration/**
            app/build/reports/release/write-engine-isolation-audit.json
            editor-core/build/reports/workflow-evidence/**
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
            app/build/reports/lint-results-*.sarif
            ai-assistant/build/reports/**
            build/reports/problems/**

  instrumentation-and-benchmark:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build prod debug APK and tests
        run: ./gradlew :app:assembleProdDebug :app:assembleProdDebugAndroidTest
      - name: Run prod debug assistant, collaboration, search, snapshots, quick tools, and editor UI tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          script: ./gradlew :app:connectedProdDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.aymanelbanhawy.enterprisepdf.app.assistant.AssistantProviderSettingsTest,com.aymanelbanhawy.enterprisepdf.app.enterprise.SettingsAdminSidebarTest,com.aymanelbanhawy.enterprisepdf.app.collaboration.CollaborationReviewFlowTest,com.aymanelbanhawy.enterprisepdf.app.scan.OcrScanImportFlowTest,com.aymanelbanhawy.enterprisepdf.app.visual.VisualSnapshotTest,com.aymanelbanhawy.enterprisepdf.app.quicktools.QuickToolsInstrumentationTest,com.aymanelbanhawy.enterprisepdf.app.editor.EditorScreenTest,com.aymanelbanhawy.enterprisepdf.app.open.PdfOpenFlowTest
      - name: Run prod debug smoke and benchmark tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          script: ./gradlew :app:connectedProdDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.aymanelbanhawy.enterprisepdf.app.smoke.CriticalWorkflowSmokeTest,com.aymanelbanhawy.enterprisepdf.app.diagnostics.LargeDocumentOpenBenchmarkTest
      - name: Build visual proof and release readiness evidence
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          script: ./gradlew :app:visualProofBundle :app:quickToolsEvidenceBundle :app:releaseReadinessEvidence
      - name: Upload visual proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-proof-artifacts
          path: |
            app/build/reports/release/visual-proof/**
            app/build/reports/release/quick-tools-proof/**
            app/build/reports/release/source-inspiration/**
            app/build/reports/androidTests/**

  static-analysis:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
      - name: Upload SARIF from lint when present
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: app/build/reports/lint-results-prodDebug.sarif
          category: android-lint

  release-artifact:
    runs-on: ubuntu-latest
    needs: [lint-and-unit]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    env:
      ANDROID_SIGNING_STORE_FILE: ${{ github.workspace }}/release-signing.jks
      ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
      ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
      ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
      ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Materialize signing keystore
        if: ${{ env.ANDROID_SIGNING_KEYSTORE_BASE64 != '' }}
        run: echo "$ANDROID_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_SIGNING_STORE_FILE"
      - name: Build prod release bundle
        run: ./gradlew :app:validateReleaseReadiness :app:bundleProdRelease :app:assembleProdRelease
      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prod-release-artifacts
          path: |
            app/build/outputs/apk/prod/release/*.apk
            app/build/outputs/bundle/prodRelease/*.aab
